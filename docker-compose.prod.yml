version: '3.8'

services:
  pos_db:
    image: postgres:15-alpine
    container_name: pos_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_password_secure}
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
    volumes:
      - pos_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-pos_user} -d $${POSTGRES_DB:-pos_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pos_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: pos_backend_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pos_user}:${POSTGRES_PASSWORD:-pos_password_secure}@pos_db:5432/${POSTGRES_DB:-pos_db}
      - ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - LOG_SQL=${LOG_SQL:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://app.example.com}
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-api}
      - EMAIL_API_BASE_URL=${EMAIL_API_BASE_URL:-https://api.brevo.com/v3/smtp/email}
      - EMAIL_API_TOKEN=${EMAIL_API_TOKEN:-}
      - EMAIL_API_AUTH_HEADER=${EMAIL_API_AUTH_HEADER:-api-key}
      - EMAIL_FROM_EMAIL=${EMAIL_FROM_EMAIL:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-V1TR0 POS}
      - EMAIL_TIMEOUT_SECONDS=${EMAIL_TIMEOUT_SECONDS:-10}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_SMTP_USERNAME=${EMAIL_SMTP_USERNAME:-}
      - EMAIL_SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD:-}
      - EMAIL_SMTP_USE_TLS=${EMAIL_SMTP_USE_TLS:-true}
      - LOW_STOCK_THRESHOLD=${LOW_STOCK_THRESHOLD:-5}
      - DEFAULT_NOTIFICATION_RECIPIENTS=${DEFAULT_NOTIFICATION_RECIPIENTS:-}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.example.com}
      - PASSWORD_RESET_EXPIRE_MINUTES=${PASSWORD_RESET_EXPIRE_MINUTES:-30}
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - DAILY_SUMMARY_HOUR_UTC=${DAILY_SUMMARY_HOUR_UTC:-23}
      - RUN_MIGRATIONS_ON_STARTUP=${RUN_MIGRATIONS_ON_STARTUP:-false}
    depends_on:
      pos_db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8000"

  pos_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: pos_frontend_prod
    restart: always
    ports:
      - "127.0.0.1:8089:80"
    depends_on:
      - pos_backend

volumes:
  pos_pgdata_prod:
